<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #6c79d4 0%, #7c60c0 55%, #8b55b8 100%);
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 36px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(80, 60, 160, 0.22);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 1.85rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 36px;
      letter-spacing: -0.5px;
    }

    .field {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1.5px solid #e0e0ec;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      color: #2d2d4e;
      background: #f5f6fb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: #aaa; }

    input:focus {
      border-color: #6c79d4;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(108, 121, 212, 0.18);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 17px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6c79d4 0%, #9b59c4 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover  { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register Form</h1>

    <div class="field">
      <input type="text" placeholder="Uday Nitin Behalpade" />
    </div>
    <div class="field">
      <input type="email" placeholder="UB12345.@gmail.com" />
    </div>
    <div class="field">
      <input type="password" placeholder="••••••••••" />
    </div>
    <div class="field">
      <input type="password" placeholder="••••••••••" />
    </div>

    <button class="btn">Submit</button>
  </div>
</body>
</html>
